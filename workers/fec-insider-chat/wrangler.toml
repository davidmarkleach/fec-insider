name = "fec-insider-chat"
main = "src/index.js"
compatibility_date = "2024-09-23"

[vars]
GHOST_URL = "https://fec-insider.ghost.io"

# Secrets (set via `wrangler secret put ...`):
# ANTHROPIC_API_KEY
# GHOST_ADMIN_KEY_ID
# GHOST_ADMIN_KEY_SECRET   (hex string from Ghost Admin API key)
# ZAPIER_CHAT_WEBHOOK
# ZAPIER_FEEDBACK_WEBHOOK
# ZAPIER_SUBSCRIBE_WEBHOOK
