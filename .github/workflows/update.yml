name: Daily News Update
on:
  schedule:
    - cron: "0 11 * * *" # 7 AM ET (11 UTC) every day
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run curation script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GA4_ID: ${{ secrets.GA4_ID }}
          CLARITY_ID: ${{ secrets.CLARITY_ID }}
          CHAT_API_URL: ${{ secrets.CHAT_API_URL }}
        run: python scripts/curate.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "FEC Insider Bot"
          git config user.email "bot@fec-insider.github.io"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily update: $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: curate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
