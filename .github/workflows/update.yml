name: Daily News Update
on:
  schedule:
    - cron: "0 11 * * *" # 7 AM ET (11 UTC) every day
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run curation script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/curate.py

      - name: Commit and push if changed
        run: |
          git config user.name "FEC Insider Bot"
          git config user.email "bot@fec-insider.github.io"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily update: $(date -u +%Y-%m-%d)"
            git push
          fi
