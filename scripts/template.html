<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEC Insider</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@400;500;600;700&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #070714;
    --bg-alt:        #0f0f28;
    --accent:        #7C3AED;
    --accent-strong: #9461F5;
    --accent-a10:    rgba(124, 58, 237, 0.1);
    --accent-a20:    rgba(124, 58, 237, 0.2);
    --accent-a30:    rgba(124, 58, 237, 0.3);
    --on-dark:       #ffffff;
    --on-dark-75:    rgba(255, 255, 255, 0.75);
    --on-dark-70:    rgba(255, 255, 255, 0.7);
    --on-dark-60:    rgba(255, 255, 255, 0.6);
    --on-dark-45:    rgba(255, 255, 255, 0.45);
    --on-dark-ring:  rgba(255, 255, 255, 0.14);
    --ink:           #070714;
    --ink-70:        rgba(7, 7, 20, 0.7);
    --ink-50:        rgba(7, 7, 20, 0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); }
  body {
    font-family: 'Lato', Helvetica, Arial, sans-serif;
    font-size: 16px; line-height: 1.6;
    color: var(--on-dark);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }
  .container {
    max-width: 720px; margin: 0 auto;
    padding: 32px 20px 36px;
  }
  .header { margin-bottom: 28px; }
  .title {
    font-family: 'Montserrat', sans-serif;
    font-size: 28px; font-weight: 600;
    letter-spacing: -0.01em; line-height: 1.1;
    color: var(--on-dark);
    margin-bottom: 10px;
  }
  .title strong {
    font-weight: 700; color: var(--accent-strong);
  }
  .subtitle {
    font-family: 'Lato', sans-serif;
    font-size: 16px; line-height: 1.5;
    font-weight: 400; color: var(--on-dark-70);
  }
  .timestamp {
    margin-top: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 13px; color: var(--on-dark-45);
    font-weight: 400;
  }
  .tabs {
    display: flex; gap: 4px; margin-bottom: 22px;
    overflow-x: auto; padding-bottom: 2px; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 100rem;
    padding: 8px 14px;
    color: var(--on-dark-75);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 14px; font-weight: 400;
    cursor: pointer; white-space: nowrap;
    transition: background-color 0.2s ease, color 0.2s ease,
                box-shadow 0.2s ease, border-color 0.2s ease;
  }
  .tab:hover {
    background: rgba(255, 255, 255, 0.06);
    color: var(--on-dark);
  }
  .tab.active {
    background: var(--accent-a10);
    color: var(--on-dark);
    box-shadow:
      inset 0 0 0 1px var(--accent-a30),
      inset 0 0 0 2px rgba(255, 255, 255, 0.06);
  }
  .feed { display: flex; flex-direction: column; gap: 14px; }
  .card {
    display: block;
    text-decoration: none;
    color: inherit;
    background: #ffffff;
    border-radius: 1.25rem;
    padding: 22px 24px;
    box-shadow:
      0 0 0 1px var(--on-dark-ring),
      0 2px 3px 0 rgba(0, 0, 0, 0.10),
      0 1px 1px 0 rgba(0, 0, 0, 0.08),
      0 16px 32px -10px rgba(0, 0, 0, 0.45);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: fadeSlideIn 0.5s ease-out both;
  }
  a.card { cursor: pointer; }
  .card:hover {
    transform: translateY(-2px);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.22),
      0 4px 6px 0 rgba(0, 0, 0, 0.12),
      0 20px 40px -10px rgba(0, 0, 0, 0.55);
  }
  a.card:hover h3 {
    text-decoration: underline;
    text-decoration-color: var(--accent);
    text-decoration-thickness: 2px;
    text-underline-offset: 3px;
  }
  .card-top {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 12px; margin-bottom: 8px;
  }
  .card-cat {
    font-family: 'Lato', sans-serif;
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    white-space: nowrap;
  }
  .card-source {
    font-family: 'Lato', sans-serif;
    font-size: 12px; color: var(--ink-50);
    font-weight: 400; text-align: right;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card h3 {
    font-family: 'Montserrat', sans-serif;
    font-size: 18px; font-weight: 600;
    letter-spacing: -0.01em; line-height: 1.3;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .card p {
    font-family: 'Lato', sans-serif;
    font-size: 14px; line-height: 1.6;
    color: var(--ink-70);
    font-weight: 400;
  }
  .footer {
    margin-top: 34px; padding-top: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    text-align: center;
  }
  .footer p {
    font-family: 'Lato', sans-serif;
    font-size: 13px; color: var(--on-dark-60);
    font-weight: 400;
  }
  .footer .brand {
    color: var(--on-dark); font-weight: 700;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 class="title">FEC <strong>Insider</strong></h1>
    <p class="subtitle">Curated news for the Family Entertainment Center industry</p>
    <p class="timestamp" id="timestamp" data-iso="{{TIMESTAMP_ISO}}"></p>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="feed" id="feed"></div>
  <div class="footer"><p>Powered by AI &middot; <span class="brand">FEC Insider</span> &middot; Subscriber Exclusive</p></div>
</div>
<script>
const articles = {{ARTICLES_JSON}};
const CATEGORIES = [
  { id: "all",         label: "All Updates" },
  { id: "attractions", label: "Attractions" },
  { id: "tech",        label: "Technology" },
  { id: "business",    label: "Business" },
  { id: "ops",         label: "Operations" },
  { id: "design",      label: "Design & Trends" }
];
let activeCat = "all";
function formatTimestamp(iso) {
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return "";
    const date = d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    const time = d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    return `Updated ${date} \u00b7 ${time}`;
  } catch (e) { return ""; }
}
function renderHeader() {
  const el = document.getElementById("timestamp");
  el.textContent = formatTimestamp(el.dataset.iso);
}
function renderTabs() {
  const container = document.getElementById("tabs");
  container.innerHTML = CATEGORIES.map(c =>
    `<button class="tab ${c.id === activeCat ? 'active' : ''}" data-cat="${c.id}">${c.label}</button>`
  ).join("");
  container.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      activeCat = btn.dataset.cat;
      renderTabs();
      renderFeed();
    });
  });
}
function safeHref(url) {
  if (!url || typeof url !== "string") return null;
  const u = url.trim();
  if (!/^https?:\/\//i.test(u)) return null;
  return u.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function renderFeed() {
  const filtered = activeCat === "all"
    ? articles
    : articles.filter(a => a.categoryId === activeCat);
  const container = document.getElementById("feed");
  container.innerHTML = filtered.map((a, i) => {
    const href = safeHref(a.url);
    const tag = href ? "a" : "article";
    const attrs = href ? `href="${href}" target="_blank" rel="noopener noreferrer"` : "";
    const catColor = a.categoryColor || "var(--accent)";
    return `
    <${tag} class="card" ${attrs} style="animation-delay: ${i * 0.05}s">
      <div class="card-top">
        <span class="card-cat" style="color: ${catColor}">${a.categoryLabel || a.category}</span>
        <span class="card-source">${a.source ? 'via ' + a.source : ''}</span>
      </div>
      <h3>${a.title}</h3>
      <p>${a.summary}</p>
    </${tag}>`;
  }).join("");
}
renderHeader();
renderTabs();
renderFeed();
function postHeight() {
  if (window.parent === window) return;
  const h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
  window.parent.postMessage({ type: "fec-insider:height", height: h }, "*");
}
if (window.ResizeObserver) { new ResizeObserver(postHeight).observe(document.body); }
window.addEventListener("load", postHeight);
if (document.fonts && document.fonts.ready) { document.fonts.ready.then(postHeight); }
setTimeout(postHeight, 100);
setTimeout(postHeight, 1000);
</script>
</body>
</html>
