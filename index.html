  .timestamp {

    font-size: 13px; color: var(--on-dark-45);

  .tabs {

  .tab {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 100rem;
    padding: 8px 14px;
    color: var(--on-dark-75);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 14px; font-weight: 400;
    cursor: pointer; white-space: nowrap;
    transition: background-color 0.2s ease, color 0.2s ease,

  }
  .tab:hover { background: rgba(255, 255, 255, 0.06); color: var(--on-dark); }
  .tab.active {
    background: var(--accent-a10);
    color: var(--on-dark);
    box-shadow: inset 0 0 0 1px var(--accent-a30), inset 0 0 0 2px rgba(255, 255, 255, 0.06);
  }
  .feed { display: flex; flex-direction: column; gap: 14px; }
  .card {

    background: #ffffff; border-radius: 1.25rem; padding: 22px 24px;
    box-shadow: 0 0 0 1px var(--on-dark-ring), 0 2px 3px 0 rgba(0,0,0,0.10),
      0 1px 1px 0 rgba(0,0,0,0.08), 0 16px 32px -10px rgba(0,0,0,0.45);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: fadeSlideIn 0.5s ease-out both;
  }
  a.card { cursor: pointer; }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.22), 0 4px 6px 0 rgba(0,0,0,0.12),

  }
  a.card:hover h3 {
    text-decoration: underline; text-decoration-color: var(--accent);
    text-decoration-thickness: 2px; text-underline-offset: 3px;
  }
  .card-top {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 12px; margin-bottom: 8px;
  }
  .card-cat {
    font-family: 'Lato', sans-serif; font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap;
  }
  .card-source {
    font-family: 'Lato', sans-serif; font-size: 12px; color: var(--ink-50);
    font-weight: 400; text-align: right; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .card h3 {
    font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 600;
    letter-spacing: -0.01em; line-height: 1.3; color: var(--ink); margin-bottom: 8px;
  }
  .card p {
    font-family: 'Lato', sans-serif; font-size: 14px; line-height: 1.6;
    color: var(--ink-70); font-weight: 400;
  }

    margin-top: 34px; padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.08); text-align: center;
  }
  .footer p { font-family: 'Lato', sans-serif; font-size: 13px; color: var(--on-dark-60); font-weight: 400; }

    from { opacity: 0; transform: translateY(8px); }

  .action-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 9000;
    display: flex; justify-content: space-around; align-items: stretch;
    padding: 6px 0;
    padding-bottom: calc(6px + env(safe-area-inset-bottom, 0));
    background: linear-gradient(to top, rgba(7,7,20,0.97) 50%, rgba(7,7,20,0.85));
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .action-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; flex: 1;
    background: none; border: none; color: var(--on-dark-70);
    font-family: 'Lato', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer; padding: 8px 4px; border-radius: 10px;
    transition: color 0.2s, background 0.2s;
    text-decoration: none; -webkit-tap-highlight-color: transparent;
    min-height: 52px;
  }
  .action-btn:hover, .action-btn:focus-visible {
    color: var(--on-dark); background: rgba(255,255,255,0.06);
  }
  .action-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .action-btn.accent { color: var(--accent-strong); }
  .action-btn.accent:hover, .action-btn.accent:focus-visible {
    color: #fff; background: var(--accent-a20);
  }

  .panel-overlay {
    position: fixed; inset: 0; z-index: 9998;
    background: rgba(0,0,0,0.55);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .panel-overlay.open { opacity: 1; pointer-events: auto; }

  body.panel-open { overflow: hidden; }

  .slide-panel {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 9999;
    height: 92vh; height: 92dvh;
    background: #fff; border-radius: 20px 20px 0 0;
    display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    overflow: hidden;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.4);
  }
  .slide-panel.open { transform: translateY(0); }
  @media (min-width: 641px) {
    .slide-panel { max-width: 480px; margin: 0 auto; height: 80vh; }
  }

  .panel-header {
    background: linear-gradient(135deg, var(--accent) 0%, #5B21B6 100%);
    padding: 16px 18px; display: flex; align-items: center; gap: 12px;
    flex-shrink: 0; border-radius: 20px 20px 0 0;

    width: 36px; height: 36px; border-radius: 50%; object-fit: cover;

  .panel-header-title {

  .panel-header-sub {

    display: flex; align-items: center; justify-content: center;
    line-height: 1;

    flex-direction: column; gap: 12px;
    scrollbar-width: thin; scrollbar-color: #d1d5db transparent;

    width: 8px; height: 8px; border-radius: 50%; background: #9ca3af;
    animation: typing-bounce 1.4s infinite both;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }

    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0));

    display: flex; gap: 8px; align-items: center; flex-shrink: 0;

    cursor: pointer; transition: background-color 0.2s;

  .feedback-success {
    text-align: center; padding: 40px 20px; color: #10B981;
    font-family: 'Lato', sans-serif; font-size: 15px; font-weight: 600;

</style>

];
let activeCat = "all";
function formatTimestamp(iso) {
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return "";
    const date = d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    const time = d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    return `Updated ${date} \u00b7 ${time}`;
  } catch (e) { return ""; }
}
function renderHeader() {
  const el = document.getElementById("timestamp");
  el.textContent = formatTimestamp(el.dataset.iso);
}
function renderTabs() {
  const container = document.getElementById("tabs");
  container.innerHTML = CATEGORIES.map(c =>
    `<button class="tab ${c.id === activeCat ? 'active' : ''}" data-cat="${c.id}">${c.label}</button>`
  ).join("");
  container.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      activeCat = btn.dataset.cat;
      renderTabs();
      renderFeed();
    });
  });
}
function safeHref(url) {
  if (!url || typeof url !== "string") return null;
  const u = url.trim();
  if (!/^https?:\/\//i.test(u)) return null;
  return u.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function renderFeed() {
  const filtered = activeCat === "all"
    ? articles
    : articles.filter(a => a.categoryId === activeCat);
  const container = document.getElementById("feed");
  container.innerHTML = filtered.map((a, i) => {
    const href = safeHref(a.url);
    const tag = href ? "a" : "article";
    const attrs = href ? `href="${href}" target="_blank" rel="noopener noreferrer"` : "";
    const catColor = a.categoryColor || "var(--accent)";
    return `
    <${tag} class="card" ${attrs} style="animation-delay: ${i * 0.05}s">
      <div class="card-top">
        <span class="card-cat" style="color: ${catColor}">${a.categoryLabel || a.category}</span>
        <span class="card-source">${a.source ? 'via ' + a.source : ''}</span>
      </div>
      <h3>${a.title}</h3>
      <p>${a.summary}</p>
    </${tag}>`;
  }).join("");
}
renderHeader();
renderTabs();
renderFeed();

/* ---------- Action Bar & Panels ---------- */
const chatPanel = document.getElementById("chatPanel");
const feedbackPanel = document.getElementById("feedbackPanel");
const overlay = document.getElementById("panelOverlay");
const chatMessages = document.getElementById("chatMessages");
const chatInput = document.getElementById("chatInput");
const chatSend = document.getElementById("chatSend");

let panelScrollY = 0;
function openPanel(panel) {
  panelScrollY = window.scrollY;
  document.body.classList.add("panel-open");
  overlay.classList.add("open");
  panel.classList.add("open");
}
function closeAllPanels() {
  overlay.classList.remove("open");
  chatPanel.classList.remove("open");
  feedbackPanel.classList.remove("open");
  document.body.classList.remove("panel-open");
  window.scrollTo(0, panelScrollY);
}

document.getElementById("openChat").addEventListener("click", () => {
  openPanel(chatPanel);
  setTimeout(() => chatInput.focus(), 350);
});
document.getElementById("openFeedback").addEventListener("click", () => {
  openPanel(feedbackPanel);
});
document.getElementById("closeChat").addEventListener("click", closeAllPanels);
document.getElementById("closeFeedback").addEventListener("click", closeAllPanels);
overlay.addEventListener("click", closeAllPanels);

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `chat-msg ${type}`;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "chat-msg bot typing";
  div.id = "typingIndicator";
  div.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
function hideTyping() {
  const el = document.getElementById("typingIndicator");
  if (el) el.remove();
}

let chatHistory = [];

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = "";
  chatSend.disabled = true;
  addMessage(text, "user");
  chatHistory.push({ role: "user", content: text });
  showTyping();

  try {
    const res = await fetch(CHAT_API + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: text,
        history: chatHistory.slice(-6),
        articles: articles.map(a => ({ title: a.title, summary: a.summary, categoryLabel: a.categoryLabel, source: a.source }))
      })
    });
    hideTyping();
    if (!res.ok) throw new Error("Chat unavailable");
    const data = await res.json();
    const reply = data.reply || "Sorry, I couldn't process that.";
    addMessage(reply, "bot");
    chatHistory.push({ role: "assistant", content: reply });
  } catch (e) {
    hideTyping();
    addMessage("Sorry, I'm having trouble connecting right now. Please try again later.", "bot");
  }
  chatSend.disabled = false;
  chatInput.focus();
}

chatSend.addEventListener("click", sendMessage);
chatInput.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

document.getElementById("feedbackSubmit").addEventListener("click", async () => {
  const text = document.getElementById("feedbackText").value.trim();
  const email = document.getElementById("feedbackEmail").value.trim();
  if (!text) return;

  try {
    await fetch(CHAT_API + "/feedback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, email })
    });
  } catch (e) { /* best-effort */ }

  document.querySelector("#feedbackPanel .feedback-area").innerHTML = '<div class="feedback-success">\u2705 Thank you for your feedback!</div>';
});

/* ---------- iframe height ---------- */
function postHeight() {
  if (window.parent === window) return;
  const h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
  window.parent.postMessage({ type: "fec-insider:height", height: h }, "*");
}
if (window.ResizeObserver) { new ResizeObserver(postHeight).observe(document.body); }
window.addEventListener("load", postHeight);
if (document.fonts && document.fonts.ready) { document.fonts.ready.then(postHeight); }
setTimeout(postHeight, 100);
setTimeout(postHeight, 1000);
</script>
